<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Simulateur Eden</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Simulateur Eden</h1>

    <div id="conteneur">
        <!-- ZONE CHEVAL + TAPIS -->
        <div id="zone-cheval">
            <div id="fond-cheval"></div>

            <img id="cheval" src="images/cheval.png">

            <div class="tapis">
                <div class="couleur"></div>
                <img id="tapis_carre" class="image-tapis" src="images/tapis_carre.png">
                <img id="tapis_dressage" class="image-tapis" src="images/tapis_dressage.png" style="display:none;">
            </div>
        </div>

        <!-- PANEL OPTIONS -->
        <div id="options">
            <h2>Options :</h2>

            <h3>Formes du tapis</h3>
            <div id="boutons-formes">
                <button onclick="formeTapis('carre')">Tapis carré</button>
                <button onclick="formeTapis('dressage')">Tapis dressage</button>
            </div>

            <h3>Couleurs du tapis</h3>
            <div id="boutons-couleurs">
                <button onclick="couleurTapis('#ff0000')">Rouge</button>
                <button onclick="couleurTapis('#00ff00')">Vert</button>
                <button onclick="couleurTapis('#0000ff')">Bleu</button>
            </div>

            <input type="color" id="picker" onchange="pickerCouleur()">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
