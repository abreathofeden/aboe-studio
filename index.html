<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Simulateur Eden</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Simulateur Eden</h1>

<div id="conteneur">

    <!-- MENU -->
    <div id="menu">

        <h2>Options</h2>

        <h3>Forme du tapis</h3>

        <button onclick="formeTapis('carre')">Tapis carré</button>
        <button onclick="formeTapis('dressage')">Tapis dressage</button>

        <h3>Couleur</h3>

        <input type="color" id="picker" value="#ff0000" oninput="changerCouleur()">

    </div>

    <!-- ZONE CHEVAL -->

    <div id="scene">

        <!-- Tapis -->

        <div id="tapis">

            <div id="couleur"></div>

            <img id="tapis_carre" class="forme" src="images/tapis_carre.png">

            <img id="tapis_dressage" class="forme" src="images/tapis_dressage.png">

        </div>

        <!-- Cheval -->
        <svg id="cheval" width="200" height="250" version="1.1" xmlns="cheval_test.svg"></svg>
        <svg id="crins" width="200" height="250" version="1.1" xmlns="crins_test.svg"></svg>      

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
