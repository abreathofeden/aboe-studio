<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Simulateur Eden</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Simulateur Eden</h1>

<div id="conteneur">

    <!-- MENU -->
    <div id="options">

        <h2>Options</h2>

        <h3>Forme du tapis</h3>

        <button onclick="formeTapis('carre')">Tapis carré</button>
        <button onclick="formeTapis('dressage')">Tapis dressage</button>

        <h3>Couleur</h3>

        <input
            type="color"
            id="picker"
            value="#ff0000"
            oninput="pickerCouleur()">

    </div>

    <!-- ZONE CHEVAL -->

    <div id="zone-cheval">

        <div id="fond-cheval"></div>

        <img id="cheval" src="images/cheval.png">

        <div id="tapis">

            <div id="couleur_tapis"></div>

            <img
                id="tapis_carre"
                class="image-tapis"
                src="images/tapis_carre.png">

            <img
                id="tapis_dressage"
                class="image-tapis"
                src="images/tapis_dressage.png"
                style="display:none;">

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
